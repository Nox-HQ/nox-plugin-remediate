name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Remove local replace
        run: sed -i '/^replace /d' go.mod && go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.7.2
          only-new-issues: true

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Remove local replace
        run: sed -i '/^replace /d' go.mod && go mod tidy

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -v ./...

      - name: Build binary
        run: make build

  nox-scan:
    name: Nox Self-Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Nox
        uses: nox-hq/nox@v0.9.4
        with:
          path: .
          format: sarif,json
          output: nox-results
          fail-on-findings: 'false'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@33119e582d3ab4ed79c2610af108cb08ff983917 # v3
        if: always()
        with:
          sarif_file: nox-results/results.sarif
        continue-on-error: true

      - name: Upload scan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: nox-results
          path: nox-results/
          if-no-files-found: warn

  nox-pr-gate:
    name: Nox PR Gate (high/critical)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Nox (changed files only)
        uses: nox-hq/nox@v0.9.4
        with:
          path: .
          format: sarif,json
          output: nox-pr
          fail-on-findings: 'true'
          severity-threshold: high
          changed-since: origin/${{ github.base_ref }}

      - name: Upload SARIF (PR-scoped)
        uses: github/codeql-action/upload-sarif@33119e582d3ab4ed79c2610af108cb08ff983917 # v3
        if: always()
        with:
          sarif_file: nox-pr/results.sarif
          category: nox-pr
        continue-on-error: true

name: Nox Remediation

on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    name: Scan and propose dependency upgrades
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Strip local replace directives
        run: sed -i '/^replace /d' go.mod && go mod tidy

      - uses: nox-hq/nox-remediate-action@v1
        with:
          path: .
          manifest-root: .
          verify-cmd: 'go test ./...'
          pr-labels: 'security,dependencies,nox-remediation'
